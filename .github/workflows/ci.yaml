name: CI - Build and Push to ECR

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-east-1 \
        | docker login --username AWS --password-stdin 414444871239.dkr.ecr.us-east-1.amazonaws.com

    - name: Build Docker image
      run: |
        docker build -t flask-app ./app

    - name: Run container (test basic)
      run: |
        docker run -d -p 5000:5000 --name test-container flask-app
        sleep 5
        curl -f http://localhost:5000 || exit 1

    - name: Tag image
      run: |
        docker tag flask-app:latest 414444871239.dkr.ecr.us-east-1.amazonaws.com/flask-app:latest

    - name: Push to ECR
      run: |
        docker push 414444871239.dkr.ecr.us-east-1.amazonaws.com/flask-app:latest